name: pull_request
on: 
  pull_request:
    branches:
      - master
      - main
      - dev
jobs:
  build:  
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/node@v4
        with:
          node_version: 20
          cache: npm
      - run: npm ci 
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test 