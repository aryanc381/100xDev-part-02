name: CD 

on: 
  push: 
    branches: 
      - main
      - dev
      - master
      - root
jobs:
  deploy: 
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: week18-cicd 
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/week18-cicd:latest 
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with: 
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/week18-cicd:latest
            docker stop week18-cicd || true
            docker rm week18-cicd || true
            docker run -d --name week18-cicd -p 3000:3000 ${{ secrets.DOCKER_USERNAME }}/week18-cicd:latest

      