name: pull_request
on: 
  pull_request:
    branches:
      - master
      - main
      - dev
    paths:  
      - "week18-cicd/**"
jobs:
  build:  
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: week18-cicd

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: week18-cicd/package-lock.json
      - run: npm ci 
      - run: npx tsc --noEmit
      - run: npm run build
      - run: npm test 